{{- if .Values.dbInit.enabled }}
---
# init.sql を ConfigMap に格納（helm upgrade 時は --set-file dbInit.sql=database/init.sql で注入）
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexuscrm-db-init-sql
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  init.sql: |
    {{ .Values.dbInit.sql | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nexuscrm-db-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        role: db-job
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: {{ .Values.dbInit.image }}
          command: ["psql", "-f", "/sql/init.sql"]
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbInit.secretName }}
                  key: host
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dbInit.secretName }}
                  key: password
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: "nexuscrm"
            - name: PGUSER
              value: "nexuscrm"
            - name: PGSSLMODE
              value: "require"
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: nexuscrm-db-init-sql
{{- end }}
